<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Webhook Sender</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1e1f22;
      color: #dcddde;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }

    .logo svg {
      width: 36px;
      height: 36px;
    }

    h1 {
      font-size: 1.7rem;
      font-weight: 800;
      color: #fff;
    }

    .subtitle {
      color: #72767d;
      font-size: 0.83rem;
      margin-bottom: 32px;
    }

    .layout {
      display: flex;
      gap: 20px;
      width: 100%;
      max-width: 1000px;
      align-items: flex-start;
    }

    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .right {
      width: 340px;
      flex-shrink: 0;
    }

    .card {
      background: #2b2d31;
      border: 1px solid #1e1f22;
      border-radius: 12px;
      padding: 22px;
    }

    .card-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #72767d;
      margin-bottom: 16px;
      font-weight: 700;
    }

    label {
      display: block;
      font-size: 0.78rem;
      color: #b9bbbe;
      margin-bottom: 5px;
      margin-top: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    label:first-of-type {
      margin-top: 0;
    }

    input[type="text"],
    input[type="url"],
    textarea {
      width: 100%;
      background: #1e1f22;
      border: 1px solid #1a1b1e;
      border-radius: 6px;
      color: #dcddde;
      font-family: inherit;
      font-size: 0.88rem;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus,
    textarea:focus {
      border-color: #5865f2;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row>div {
      flex: 1;
    }

    .color-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .color-row input[type="color"] {
      width: 44px;
      height: 36px;
      border: 1px solid #1a1b1e;
      border-radius: 6px;
      background: #1e1f22;
      cursor: pointer;
      padding: 2px;
      flex-shrink: 0;
    }

    .color-row input[type="text"] {
      flex: 1;
    }

    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #1e1f22;
    }

    .toggle-row:last-child {
      border-bottom: none;
    }

    .toggle-label {
      font-size: 0.88rem;
      color: #dcddde;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #4f545c;
      border-radius: 22px;
      cursor: pointer;
      transition: 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.2s;
    }

    .toggle input:checked+.slider {
      background: #5865f2;
    }

    .toggle input:checked+.slider::before {
      transform: translateX(18px);
    }

    .send-btn {
      width: 100%;
      background: #5865f2;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.15s, transform 0.1s;
      margin-top: 4px;
    }

    .send-btn:hover {
      background: #4752c4;
    }

    .send-btn:active {
      transform: scale(0.98);
    }

    .send-btn:disabled {
      background: #4f545c;
      color: #72767d;
      cursor: not-allowed;
    }

    /* Preview */
    .preview-card {
      background: #2b2d31;
      border: 1px solid #1e1f22;
      border-radius: 12px;
      padding: 22px;
      position: sticky;
      top: 20px;
    }

    .preview-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #72767d;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .discord-msg {
      display: flex;
      gap: 12px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #5865f2;
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1rem;
      color: #fff;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .msg-body {
      flex: 1;
      min-width: 0;
    }

    .msg-username {
      font-weight: 700;
      color: #fff;
      font-size: 0.9rem;
      margin-bottom: 2px;
    }

    .msg-username .bot-tag {
      background: #5865f2;
      color: #fff;
      font-size: 0.6rem;
      padding: 1px 5px;
      border-radius: 3px;
      font-weight: 700;
      margin-left: 5px;
      vertical-align: middle;
    }

    .msg-content {
      font-size: 0.88rem;
      color: #dcddde;
      word-break: break-word;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .embed-preview {
      margin-top: 8px;
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      border-left: 4px solid #5865f2;
      background: #2f3136;
    }

    .embed-inner {
      padding: 10px 14px;
      flex: 1;
      min-width: 0;
    }

    .embed-author-line {
      font-size: 0.75rem;
      color: #dcddde;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .embed-title-line {
      font-size: 0.9rem;
      color: #5865f2;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .embed-desc-line {
      font-size: 0.82rem;
      color: #dcddde;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .embed-footer-line {
      font-size: 0.72rem;
      color: #72767d;
      margin-top: 8px;
    }

    /* Response */
    .response-box {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 0.82rem;
      display: none;
      word-break: break-all;
    }

    .response-box.ok {
      background: #1a3a1a;
      color: #4caf50;
      border: 1px solid #2d6a2d;
      display: block;
    }

    .response-box.err {
      background: #3a1a1a;
      color: #f44336;
      border: 1px solid #6a2d2d;
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #ffffff44;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 720px) {
      .layout {
        flex-direction: column;
      }

      .right {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="logo">
    <svg viewBox="0 0 127.14 96.36" fill="#5865f2" xmlns="http://www.w3.org/2000/svg">
      <path
        d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z" />
    </svg>
    <h1>Discord Webhook Sender</h1>
  </div>
  <p class="subtitle">made by darksql</p>

  <div class="layout">
    <div class="left">

      <!-- Webhook URL -->
      <div class="card">
        <div class="card-title">Webhook</div>
        <label>Webhook URL</label>
        <input type="url" id="webhookUrl" placeholder="https://discord.com/api/webhooks/..."
          oninput="updatePreview()" />
      </div>

      <!-- Message -->
      <div class="card">
        <div class="card-title">Mesaj</div>
        <label>Kullanıcı Adı (opsiyonel)</label>
        <input type="text" id="username" placeholder="Bot" oninput="updatePreview()" />
        <label>Avatar URL (opsiyonel)</label>
        <input type="url" id="avatarUrl" placeholder="https://..." oninput="updatePreview()" />
        <label>Mesaj İçeriği</label>
        <textarea id="content" placeholder="Mesajını buraya yaz..." oninput="updatePreview()"></textarea>
      </div>

      <!-- Embed -->
      <div class="card">
        <div class="card-title">Embed</div>

        <div class="toggle-row">
          <span class="toggle-label">Embed Ekle</span>
          <label class="toggle">
            <input type="checkbox" id="embedToggle" onchange="updatePreview()" />
            <span class="slider"></span>
          </label>
        </div>

        <div id="embedFields" style="display:none">
          <label>Renk</label>
          <div class="color-row">
            <input type="color" id="embedColorPicker" value="#5865f2" oninput="syncColor(this)" />
            <input type="text" id="embedColor" value="#5865f2" placeholder="#5865f2" oninput="syncColorText(this)"
              maxlength="7" />
          </div>

          <label>Author</label>
          <input type="text" id="embedAuthor" placeholder="Author adı..." oninput="updatePreview()" />

          <label>Başlık</label>
          <input type="text" id="embedTitle" placeholder="Embed başlığı..." oninput="updatePreview()" />

          <label>Açıklama</label>
          <textarea id="embedDesc" placeholder="Embed açıklaması..." oninput="updatePreview()"></textarea>

          <label>Footer</label>
          <input type="text" id="embedFooter" placeholder="Footer metni..." oninput="updatePreview()" />
        </div>
      </div>

      <button class="send-btn" id="sendBtn" onclick="sendWebhook()">Gönder</button>
      <div class="response-box" id="responseBox"></div>

    </div>

    <!-- Preview -->
    <div class="right">
      <div class="preview-card">
        <div class="preview-title">Önizleme</div>
        <div class="discord-msg">
          <div class="avatar" id="previewAvatar">B</div>
          <div class="msg-body">
            <div class="msg-username" id="previewUsername">Bot <span class="bot-tag">BOT</span></div>
            <div class="msg-content" id="previewContent" style="color:#72767d;font-style:italic">Mesaj içeriği...</div>
            <div class="embed-preview" id="previewEmbed" style="display:none">
              <div class="embed-inner">
                <div class="embed-author-line" id="previewEmbedAuthor" style="display:none"></div>
                <div class="embed-title-line" id="previewEmbedTitle" style="display:none"></div>
                <div class="embed-desc-line" id="previewEmbedDesc" style="display:none"></div>
                <div class="embed-footer-line" id="previewEmbedFooter" style="display:none"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const embedToggle = document.getElementById('embedToggle');
    const embedFields = document.getElementById('embedFields');

    embedToggle.addEventListener('change', () => {
      embedFields.style.display = embedToggle.checked ? 'block' : 'none';
      updatePreview();
    });

    function syncColor(el) {
      document.getElementById('embedColor').value = el.value;
      updatePreview();
    }

    function syncColorText(el) {
      const v = el.value;
      if (/^#[0-9a-fA-F]{6}$/.test(v)) {
        document.getElementById('embedColorPicker').value = v;
      }
      updatePreview();
    }

    function updatePreview() {
      const username = document.getElementById('username').value.trim() || 'Bot';
      const avatarUrl = document.getElementById('avatarUrl').value.trim();
      const content = document.getElementById('content').value;

      // Avatar
      const avatarEl = document.getElementById('previewAvatar');
      if (avatarUrl) {
        avatarEl.innerHTML = `<img src="${escHtml(avatarUrl)}" onerror="this.style.display='none'" />`;
      } else {
        avatarEl.innerHTML = username.charAt(0).toUpperCase();
      }

      // Username
      document.getElementById('previewUsername').innerHTML =
        `${escHtml(username)} <span class="bot-tag">BOT</span>`;

      // Content
      const contentEl = document.getElementById('previewContent');
      if (content.trim()) {
        contentEl.style.fontStyle = 'normal';
        contentEl.style.color = '#dcddde';
        contentEl.textContent = content;
      } else {
        contentEl.style.fontStyle = 'italic';
        contentEl.style.color = '#72767d';
        contentEl.textContent = 'Mesaj içeriği...';
      }

      // Embed
      const embedPreview = document.getElementById('previewEmbed');
      if (embedToggle.checked) {
        const color = document.getElementById('embedColor').value;
        const author = document.getElementById('embedAuthor').value.trim();
        const title = document.getElementById('embedTitle').value.trim();
        const desc = document.getElementById('embedDesc').value.trim();
        const footer = document.getElementById('embedFooter').value.trim();

        embedPreview.style.display = 'flex';
        embedPreview.style.borderLeftColor = /^#[0-9a-fA-F]{6}$/.test(color) ? color : '#5865f2';

        setEmbedField('previewEmbedAuthor', author);
        setEmbedField('previewEmbedTitle', title);
        setEmbedField('previewEmbedDesc', desc);
        setEmbedField('previewEmbedFooter', footer);
      } else {
        embedPreview.style.display = 'none';
      }
    }

    function setEmbedField(id, val) {
      const el = document.getElementById(id);
      if (val) { el.textContent = val; el.style.display = 'block'; }
      else { el.style.display = 'none'; }
    }

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    async function sendWebhook() {
      const url = document.getElementById('webhookUrl').value.trim();
      if (!url || !url.includes('discord.com/api/webhooks')) {
        showResponse('err', 'Geçerli bir Discord Webhook URL gir!');
        return;
      }

      const payload = {};

      const username = document.getElementById('username').value.trim();
      const avatarUrl = document.getElementById('avatarUrl').value.trim();
      const content = document.getElementById('content').value.trim();

      if (username) payload.username = username;
      if (avatarUrl) payload.avatar_url = avatarUrl;
      if (content) payload.content = content;

      if (embedToggle.checked) {
        const embed = {};
        const color = document.getElementById('embedColor').value;
        const author = document.getElementById('embedAuthor').value.trim();
        const title = document.getElementById('embedTitle').value.trim();
        const desc = document.getElementById('embedDesc').value.trim();
        const footer = document.getElementById('embedFooter').value.trim();

        if (author) embed.author = { name: author };
        if (title) embed.title = title;
        if (desc) embed.description = desc;
        if (footer) embed.footer = { text: footer };
        if (/^#[0-9a-fA-F]{6}$/.test(color)) {
          embed.color = parseInt(color.slice(1), 16);
        }
        payload.embeds = [embed];
      }

      if (!payload.content && !payload.embeds) {
        showResponse('err', 'En az mesaj içeriği veya embed girilmeli.');
        return;
      }

      const btn = document.getElementById('sendBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Gönderiliyor...';

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (res.status === 204 || res.ok) {
          showResponse('ok', '✓ Mesaj başarıyla gönderildi! (HTTP ' + res.status + ')');
        } else {
          const txt = await res.text();
          showResponse('err', 'Hata ' + res.status + ': ' + txt);
        }
      } catch (e) {
        showResponse('err', 'İstek gönderilemedi: ' + e.message);
      }

      btn.disabled = false;
      btn.innerHTML = 'Gönder';
    }

    function showResponse(type, msg) {
      const box = document.getElementById('responseBox');
      box.className = 'response-box ' + type;
      box.textContent = msg;
    }

    updatePreview();
  </script>

</body>

</html>
